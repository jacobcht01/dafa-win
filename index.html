<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Under Development</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Modern dark slate background */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 480px;
            width: 100%;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.025em;
            color: #f1f5f9;
        }

        p {
            font-size: 1rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        /* Minimalist Loading Bar */
        .loader-container {
            width: 100%;
            height: 4px;
            background-color: #1e293b;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .loader-bar {
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            position: absolute;
            left: -40%;
            border-radius: 4px;
            animation: travel 1.8s infinite linear;
        }

        /* Subtle pulsing for the icon */
        @keyframes pulse {
            0%, 100% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* Infinite loading line animation */
        @keyframes travel {
            from { left: -40%; }
            to { left: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🚀</div>
        <h1>Under Development</h1>
        <p>We are currently fine-tuning our new digital space. Code is being deployed, configurations are wrapping up, and we will be live shortly.</p>
        
        <div class="loader-container">
            <div class="loader-bar"></div>
        </div>
    </div>

</body>
</html>
